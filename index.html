<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生数字化画像档案 (数据驱动版)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --success: #10b981; --info: #6366f1; --warning: #f59e0b; --danger: #ef4444; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: #334155; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .top-nav { background: #fffbe6; padding: 15px 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #ffe58f; display: flex; align-items: center; gap: 20px; }
        .top-nav input { flex-grow: 1; padding: 10px; border: 1px solid #d9d9d9; border-radius: 8px; outline: none; }

        .section { margin: 30px 0; padding: 25px; border: 1px solid #f1f5f9; border-radius: 18px; background: #fff; }
        .section h3 { border-left: 5px solid var(--accent); padding-left: 15px; color: var(--primary); margin: 0 0 25px 0; background: #f8fafc; padding-block: 10px; font-size: 18px; }

        /* 问卷项样式：更紧凑的排版以适应更多问题 */
        .question-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .q-wrap { background: #fcfcfc; border: 1px solid #f1f5f9; padding: 15px; border-radius: 12px; }
        .q-label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 13px; color: #64748b; }
        .opt-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .opt-item { display: flex; align-items: center; gap: 4px; padding: 6px 10px; background: #fff; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.15s; }
        .opt-item:hover { border-color: var(--accent); background: #eff6ff; }
        .opt-item input { margin: 0; width: 14px; height: 14px; accent-color: var(--accent); }

        /* 档案卡视觉 */
        .portrait-card { border: 1px solid #000; border-radius: 0; background: #fff; padding: 0; font-family: 'JetBrains Mono', 'Noto Sans SC'; }
        .p-header { background: #000; color: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .p-body { padding: 30px; }
        
        .btn-group { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-gray { background: #e2e8f0; color: #475569; }
        .btn-danger { background: var(--danger); color: #fff; }

        .loading { display: none; text-align: center; padding: 50px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    </style>
</head>

<body>
<div class="container">
    <div class="top-nav">
        <i class="fas fa-database"></i>
        <strong>系统接入点:</strong>
        <input type="password" id="api_key" placeholder="填入 API Key 激活 AI 数据转换引擎">
    </div>

    <div id="page1" class="page active">
        <div style="text-align:center; margin-bottom:40px;">
            <h1 style="font-size:28px; letter-spacing:1px;"><i class="fas fa-microchip"></i> 学生成长画像数据站</h1>
            <p style="color:#64748b;">精准记录 8 个层级、40 个维度的原始画像数据</p>
        </div>

        <div class="grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
            <button class="btn-info" onclick="showPage(5)" style="height:60px;"><i class="fas fa-box-archive"></i> 画像存档文库</button>
            <button class="btn-success" onclick="showPage(2)" style="height:60px;"><i class="fas fa-user-plus"></i> 选择学生开始测评</button>
        </div>

        <div class="section">
            <h3><i class="fas fa-file-import"></i> 批量数据导入</h3>
            <textarea id="batchInput" rows="4" style="width:100%; border-radius:10px; padding:15px; border:1px solid #ddd; font-size:13px;" placeholder="姓名 性别 班级 时间..."></textarea>
            <div class="btn-group">
                <button class="btn-primary" onclick="importStudents()">✨ 智能解析入库</button>
                <button class="btn-gray" onclick="exportBackup()">导出备份</button>
                <button class="btn-gray" onclick="document.getElementById('importFile').click()">导入备份</button>
                <input type="file" id="importFile" style="display:none" onchange="importBackup(this)">
            </div>
        </div>

        <div class="section">
            <h3><i class="fas fa-list"></i> 名册管理</h3>
            <table id="stuTable">
                <thead><tr><th>姓名</th><th>班级</th><th>学段</th><th>状态</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
            <div style="text-align:right; margin-top:20px;"><button class="btn-danger" onclick="clearAllData()">清空数据库</button></div>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="header" style="text-align:center;"><h1>选择待测评对象</h1></div>
        <div id="studentGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:15px; margin-top:20px;"></div>
        <div class="btn-group"><button class="btn-gray" onclick="showPage(1)">返回主页</button></div>
    </div>

    <div id="page3" class="page">
        <div id="dynamicSurvey"></div>
        <div class="btn-group">
            <button class="btn-gray" onclick="showPage(2)">← 重选</button>
            <button class="btn-primary" onclick="generatePortrait()">✨ 提取数据生成画像卡</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div id="loading" class="loading"><i class="fas fa-sync fa-spin fa-2x"></i><br><br>正在对 40 维度原始数据进行结构化建模...</div>
        <div id="portraitOutput"></div>
        <div class="btn-group">
            <button class="btn-info" onclick="copyPortrait()">复制 Markdown 数据</button>
            <button class="btn-success" onclick="saveToArchive()">存入文库</button>
            <button class="btn-gray" onclick="showPage(2)">下一位</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <h1>画像文库</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn-info" onclick="downloadAllMerged()">全员导出</button>
                <button class="btn-gray" onclick="showPage(1)">返回</button>
            </div>
        </div>
        <div id="libraryContent" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top:20px;"></div>
    </div>
</div>

<script>
// --- 终极全维度问卷库 (8层级深度自定义) ---
const SURVEY_CORE = {
    preschool: [
        { group: "1. 个人与生活基础", items: [
            { id: "p1", label: "家中排行", type: "radio", opts: ["独生","老大","老二","老三"] },
            { id: "p2", label: "主要教养人", type: "radio", opts: ["父母","祖辈","保姆","混合"] },
            { id: "p3", label: "乐高接触史", type: "radio", opts: ["经常","偶尔","从不"] },
            { id: "p4", label: "如厕自理", type: "radio", opts: ["完全自理","需脱提裤辅助","需提醒"] },
            { id: "p5", label: "过敏史/特殊忌口", type: "text", placeholder: "如无请填无" }
        ]},
        { group: "2. 情绪气质与社交", items: [
            { id: "p6", label: "气质类型", type: "radio", opts: ["活泼","谨慎","平和","敏感"] },
            { id: "p7", label: "分离焦虑", type: "radio", opts: ["无","轻度","中度","明显"] },
            { id: "p8", label: "有效安抚", type: "radio", opts: ["拥抱","注意力转移","夸奖","陪伴"] },
            { id: "p9", label: "同伴互动", type: "radio", opts: ["主动","跟随","平行","独自"] },
            { id: "p10", label: "冲突处理", type: "radio", opts: ["表达","退让","求助","爆发"] },
            { id: "p11", label: "规则意识", type: "radio", opts: ["遵守","需提醒","无意识"] }
        ]},
        { group: "3. 动作与感官(L1-L4)", items: [
            { id: "p12", label: "学习偏好", type: "radio", opts: ["视觉","听觉","动觉","混合"] },
            { id: "p13", label: "精细动作(固定)", type: "radio", opts: ["灵活","需引导","力量不足"] },
            { id: "p14", label: "手眼协调", type: "radio", opts: ["精准","一般","需练习"] },
            { id: "p15", label: "搭建稳定性", type: "radio", opts: ["关注底部加固","随性堆砌","理解垂直支撑"] },
            { id: "p16", label: "小颗粒操作", type: "radio", opts: ["熟练","尝试中","较困难"] }
        ]},
        { group: "4. 认知表现", items: [
            { id: "p17", label: "指令理解", type: "radio", opts: ["完全理解","需简化","需动作配合"] },
            { id: "p18", label: "语言表达", type: "radio", opts: ["清晰因果","简单词汇","有限"] },
            { id: "p19", label: "想象力/创造", type: "radio", opts: ["天马行空","模仿为主","两者结合"] },
            { id: "p20", label: "专注时长", type: "radio", opts: ["<10min","10-20min",">20min"] }
        ]}
    ],
    primary_low: [
        { group: "1. 学习气质与心态", items: [
            { id: "l1", label: "参与度", type: "radio", opts: ["积极举手","被动答","需鼓励"] },
            { id: "l2", label: "提问习惯", type: "radio", opts: ["主动追问","私下问","不问"] },
            { id: "l3", label: "胜负心理", type: "radio", opts: ["平和","波动大","不关心"] },
            { id: "l4", label: "合作分工", type: "radio", opts: ["善于分工","争抢","独立"] }
        ]},
        { group: "2. 逻辑与机械能力(L5-SPIKE)", items: [
            { id: "l5", label: "逻辑思维", type: "radio", opts: ["1星","2星","3星","4星","5星"] },
            { id: "l6", label: "空间想象", type: "radio", opts: ["1星","2星","3星","4星","5星"] },
            { id: "l7", label: "机械原理理解", type: "radio", opts: ["清晰","会用不解","记忆性"] },
            { id: "l8", label: "调试耐心", type: "radio", opts: ["有耐心","一般","易急躁"] },
            { id: "l9", label: "故障排查", type: "radio", opts: ["主动分析","尝试后问","求助"] }
        ]},
        { group: "3. 学科基础衔接", items: [
            { id: "l10", label: "数学基础", type: "radio", opts: ["超越年龄","一般","需加强"] },
            { id: "l11", label: "识字量", type: "radio", opts: ["自主阅读","需辅助","较弱"] },
            { id: "l12", label: "书写/键盘速度", type: "radio", opts: ["快","一般","慢"] }
        ]},
        { group: "4. 家庭教育背景", items: [
            { id: "l13", label: "辅导模式", type: "radio", opts: ["自主","家长陪同","主导"] },
            { id: "l14", label: "家长焦虑度", type: "radio", opts: ["佛系","适度","较焦虑"] },
            { id: "l15", label: "期望成果", type: "radio", opts: ["兴趣","进步","竞赛","参考"] }
        ]}
    ],
    primary_high: [
        { group: "1. 学习成熟度(Kitten-AI)", items: [
            { id: "h1", label: "自主规划力", type: "radio", opts: ["强","中","弱"] },
            { id: "h2", label: "目标意识", type: "radio", opts: ["清晰","模糊","被动"] },
            { id: "h3", label: "元认知自评", type: "radio", opts: ["精准","大概","不清楚"] },
            { id: "h4", label: "思维倾向", type: "radio", opts: ["分析型","创造型","实践型"] }
        ]},
        { group: "2. 技术深度评估(AICODE)", items: [
            { id: "h5", label: "打字规范", type: "radio", opts: ["盲打","准但慢","寻键"] },
            { id: "h6", label: "代码排版", type: "radio", opts: ["极致规范","可读","混乱"] },
            { id: "h7", label: "AI协作水平", type: "radio", opts: ["驾驭","依赖","抗拒"] },
            { id: "h8", label: "Prompt质量", type: "radio", opts: ["精准","可用","需大幅引导"] },
            { id: "h9", label: "报错处理", type: "radio", opts: ["看日志","盲猜","求助"] }
        ]},
        { group: "3. 竞赛与项目素养", items: [
            { id: "h10", label: "抗压能力", type: "radio", opts: ["享受","过急","紧张"] },
            { id: "h11", label: "挫折恢复", type: "radio", opts: ["快","需时间","气馁"] },
            { id: "h12", label: "MVP意识", type: "radio", opts: ["强","一般","无"] },
            { id: "h13", label: "文档习惯", type: "radio", opts: ["主动","要求才写","不写"] }
        ]},
        { group: "4. 未来规划倾向", items: [
            { id: "h14", label: "数学逻辑", type: "radio", opts: ["卓越","优秀","良好","一般"] },
            { id: "h15", label: "英语文档阅读", type: "radio", opts: ["自如","基础","困难"] },
            { id: "h16", label: "科技志向", type: "radio", opts: ["明确","有兴趣","仅学习"] }
        ]}
    ]
};

let studentDB = JSON.parse(localStorage.getItem('stu_data_v13')) || [];
let activeStu = null;
let currentMD = "";

function importStudents() {
    const raw = document.getElementById('batchInput').value.trim();
    if(!raw) return;
    raw.split('\n').forEach(line => {
        const p = line.trim().split(/[,\s\t]+/).filter(i => i);
        if(p.length >= 3) {
            let levelKey = "primary_low";
            if(/意识|管道|发现|螺丝刀|发明|动力/.test(p[2])) levelKey = "preschool";
            if(/AICODE|AI03|代码/.test(p[2])) levelKey = "primary_high";
            if(!studentDB.find(s => s.name === p[0])) {
                studentDB.push({ name:p[0], sex:p[1], class:p[2], time:p.slice(3).join(' '), level:levelKey, md:"", progress:{} });
            }
        }
    });
    saveDb(); renderTable(); document.getElementById('batchInput').value = "";
}

function saveDb() { localStorage.setItem('stu_data_v13', JSON.stringify(studentDB)); }

function renderTable() {
    const tbody = document.querySelector('#stuTable tbody');
    tbody.innerHTML = studentDB.map((s, i) => `
        <tr><td><b>${s.name}</b></td><td>${s.class}</td><td><small>${s.level}</small></td>
        <td>${s.md ? '<span style="color:var(--success)">● 已归档</span>' : '<span style="color:#999">○ 待测</span>'}</td>
        <td><button class="btn-danger" style="padding:4px 8px;" onclick="delStu(${i})">删除</button></td></tr>`).join('');
}

function openSurvey(name) {
    activeStu = studentDB.find(s => s.name === name);
    const container = document.getElementById('dynamicSurvey');
    container.innerHTML = `<div class="section"><h3>档案基本信息: ${activeStu.name}</h3><textarea id="remark" placeholder="手动输入课堂细节..." oninput="autoSave()">${activeStu.progress.remark || ''}</textarea></div>`;

    SURVEY_CORE[activeStu.level].forEach(group => {
        let html = `<div class="section"><h3>${group.group}</h3><div class="question-grid">`;
        group.items.forEach(item => {
            const saved = activeStu.progress[item.id] || "";
            html += `<div class="q-wrap"><label class="q-label">${item.label}</label>`;
            if(item.type === "radio") {
                html += `<div class="opt-group">${item.opts.map(o => `<label class="opt-item"><input type="radio" name="${item.id}" value="${o}" ${saved===o?'checked':''} onchange="autoSave()"> ${o}</label>`).join('')}</div>`;
            } else {
                html += `<input type="text" name="${item.id}" value="${saved}" placeholder="${item.placeholder}" oninput="autoSave()">`;
            }
            html += `</div>`;
        });
        container.innerHTML += html + `</div></div>`;
    });
    showPage(3);
}

function autoSave() {
    const data = { remark: document.getElementById('remark').value };
    document.querySelectorAll('#dynamicSurvey input:checked, #dynamicSurvey input[type=text]').forEach(i => { if(i.name) data[i.name] = i.value; });
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].progress = data; saveDb();
}

async function generatePortrait() {
    const key = document.getElementById('api_key').value.trim();
    if(!key) return alert("API Key Required");
    showPage(4); document.getElementById('loading').style.display='block';
    
    const prompt = `你是数据分析专家。请将以下原始测评数据转化为一个结构化的“数字化画像数据卡”。
    数据：${JSON.stringify(activeStu.progress)}。
    要求：
    1. 严禁主观叙述，严禁建议。
    2. 使用[属性名: 值]的格式。
    3. 必须包含：[能力指数表(量化)]、[行为标签云]、[核心特质定性]。
    4. 风格：冷峻、精确、数据化。`;

    try {
        const res = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
            body:JSON.stringify({model:"glm-4-flash", messages:[{role:"user",content:prompt}]})
        });
        const d = await res.json(); currentMD = d.choices[0].message.content;
        document.getElementById('portraitOutput').innerHTML = `<div class="portrait-card"><div class="p-header"><h2>${activeStu.name}</h2><span>${activeStu.class} | ${activeStu.time}</span></div><div class="p-body">${marked.parse(currentMD)}</div></div>`;
    } catch(e) { alert("Error"); } finally { document.getElementById('loading').style.display='none'; }
}

function saveToArchive() { const idx = studentDB.findIndex(s => s.name === activeStu.name); studentDB[idx].md = currentMD; saveDb(); showPage(5); }
function showPage(n) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(`page${n}`).classList.add('active'); if(n===2) renderGrid(); if(n===5) renderLibrary(); }
function renderGrid() { document.getElementById('studentGrid').innerHTML = studentDB.map(s => `<div class="opt-item" style="padding:20px; text-align:center;" onclick="openSurvey('${s.name}')"><b>${s.name}</b><br><small>${s.class}</small></div>`).join(''); }
function renderLibrary() { document.getElementById('libraryContent').innerHTML = studentDB.filter(s => s.md).map(s => `<div class="opt-item" style="padding:20px;" onclick="viewOld('${s.name}')"><b>${s.name}</b><br><small>${s.class}</small></div>`).join(''); }
function viewOld(name) { const s = studentDB.find(st => st.name === name); activeStu = s; currentMD = s.md; showPage(4); document.getElementById('portraitOutput').innerHTML = `<div class="portrait-card"><div class="p-header"><h2>${s.name}</h2><span>${s.class}</span></div><div class="p-body">${marked.parse(s.md)}</div></div>`; }
function delStu(i) { studentDB.splice(i, 1); saveDb(); renderTable(); }
function clearAllData() { if(confirm("Clear?")) { studentDB = []; saveDb(); renderTable(); } }
function exportBackup() { const blob = new Blob([JSON.stringify(studentDB)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click(); }
function importBackup(input) { const reader = new FileReader(); reader.onload = function(){ studentDB = JSON.parse(reader.result); saveDb(); renderTable(); }; reader.readAsText(input.files[0]); }
function copyPortrait() { navigator.clipboard.writeText(currentMD).then(() => alert("Copied")); }
function downloadAllMerged() { const blob = new Blob([studentDB.filter(s => s.md).map(s => s.md).join('\n\n---\n\n')], {type:'text/markdown'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'all_portraits.md'; a.click(); }

window.onload = function() { renderTable(); document.getElementById('api_key').value = localStorage.getItem('zhipu_api_key') || ''; }
</script>
</body>
</html>
