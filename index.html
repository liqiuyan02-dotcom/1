<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育智库 - 全维度学生画像系统 (AI技能增强版)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --success: #10b981; --info: #6366f1; --warning: #f59e0b; --danger: #ef4444; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: #334155; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* API 顶栏 */
        .top-nav { background: #fffbe6; padding: 15px 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #ffe58f; display: flex; align-items: center; gap: 20px; }
        .top-nav input { flex-grow: 1; padding: 10px; border: 1px solid #d9d9d9; border-radius: 8px; outline: none; }

        .section { margin: 30px 0; padding: 25px; border: 1px solid #f1f5f9; border-radius: 18px; background: #fff; }
        .section h3 { border-left: 6px solid var(--accent); padding-left: 15px; color: var(--primary); margin: 0 0 25px 0; background: #f8fafc; padding-block: 10px; font-size: 18px; border-radius: 0 8px 8px 0; }

        /* 问卷卡片样式 */
        .question-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .q-wrap { background: #fcfcfc; border: 1px solid #f1f5f9; padding: 20px; border-radius: 15px; transition: 0.2s; }
        .q-wrap:hover { border-color: var(--accent); background: #fff; }
        .q-label { display: block; font-weight: 700; margin-bottom: 12px; font-size: 14px; color: #475569; }
        
        .opt-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .opt-item { display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: #fff; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer; transition: 0.15s; }
        .opt-item input { margin: 0; width: 16px; height: 16px; accent-color: var(--accent); }
        .opt-item.checked { background: #eff6ff; border-color: var(--accent); font-weight: bold; color: var(--accent); }

        /* 进度条 */
        .sticky-progress { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .p-bar { height: 10px; background: #edf2f7; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        .p-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.4s; }

        /* 画像卡：硬核数字化风格 */
        .portrait-card { border: 2px solid #000; border-radius: 0; background: #fff; font-family: 'JetBrains Mono', 'Noto Sans SC'; margin-top: 20px; }
        .p-header { background: #000; color: #fff; padding: 25px 35px; display: flex; justify-content: space-between; align-items: center; }
        .p-body { padding: 45px; font-size: 14px; color: #111; line-height: 1.8; }
        
        button { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-gray { background: #e2e8f0; color: #475569; }
        button:hover { transform: translateY(-2px); filter: brightness(0.9); }

        textarea, input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; font-size: 14px; }
        .loading { display: none; text-align: center; padding: 60px; color: var(--accent); font-weight: bold; }
        .stu-card { background: #fff; border: 1px solid var(--border); padding: 25px; border-radius: 20px; cursor: pointer; text-align: center; transition: 0.3s; }
        .stu-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(52,152,219,0.1); }
    </style>
</head>

<body>
<div class="container">
    <div class="top-nav">
        <i class="fas fa-microchip"></i>
        <strong>全维度数字化画像引擎:</strong>
        <input type="password" id="api_key" placeholder="填入 API Key 激活全量分析模型">
    </div>

    <div id="page1" class="page active">
        <div style="text-align:center; margin-bottom:40px;">
            <h1 style="font-size:32px; color:var(--primary);"><i class="fas fa-robot"></i> 全阶段学生画像数字化名册</h1>
            <p style="color:#64748b;">支持 AI 协作技能、C++ 规范、MVP 思维等 55+ 饱和维度记录</p>
        </div>

        <div class="grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
            <button class="btn-info" onclick="showPage(5)" style="height:70px; font-size:16px;"><i class="fas fa-archive"></i> 画像文库 / 全员导出</button>
            <button class="btn-success" onclick="showPage(2)" style="height:70px; font-size:16px;"><i class="fas fa-plus-circle"></i> 选择学生开启/编辑画像</button>
        </div>

        <div class="section">
            <h3><i class="fas fa-users-cog"></i> 名册管理与智能入库</h3>
            <textarea id="batchInput" rows="4" style="width:100%;" placeholder="粘贴格式：姓名,性别,班级,时间..."></textarea>
            
            <div id="editForm" style="display:none; grid-template-columns: repeat(4, 1fr); gap:15px; margin-top:15px; background:#f0f9ff; padding:20px; border-radius:15px;">
                <div><label>姓名</label><input type="text" id="editName"></div>
                <div><label>性别</label><input type="text" id="editSex"></div>
                <div><label>班级</label><input type="text" id="editClass"></div>
                <div><label>上课时间</label><input type="text" id="editTime"></div>
            </div>

            <div class="btn-group">
                <button class="btn-primary" id="mainEntryBtn" onclick="handleMainAction()">✨ 同步名单到本地名册</button>
                <button class="btn-gray" id="cancelEditBtn" style="display:none;" onclick="cancelEdit()">取消修改</button>
                <button class="btn-gray" onclick="exportBackup()">导出全库备份</button>
                <button class="btn-gray" onclick="document.getElementById('importFile').click()">还原库</button>
                <input type="file" id="importFile" style="display:none" onchange="importBackup(this)">
            </div>

            <table id="stuTable" style="margin-top:20px; width:100%;">
                <thead><tr><th>姓名</th><th>班级</th><th>学段预判</th><th>状态</th><th>管理操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="header" style="text-align:center;"><h1>选择待观测对象</h1><p>点击学生继续编辑或开启新深度画像</p></div>
        <div id="studentGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:20px; margin-top:30px;"></div>
        <div class="btn-group"><button class="btn-gray" onclick="showPage(1)">返回主页</button></div>
    </div>

    <div id="page3" class="page">
        <div class="sticky-progress">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; padding:0 10px;">
                <span id="p-text">维度观测进度: 0/0</span>
                <span id="save-hint" style="color:var(--success);"><i class="fas fa-check-circle"></i> 实时已同步</span>
            </div>
            <div class="p-bar"><div id="p-fill" class="p-fill"></div></div>
        </div>
        <div id="dynamicSurvey"></div>
        <div class="btn-group">
            <button class="btn-gray" onclick="showPage(2)">← 返回选人</button>
            <button class="btn-primary" onclick="generatePortrait()">✨ 提取实时数据生成数字化画像</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div id="loading" class="loading"><i class="fas fa-sync fa-spin fa-2x"></i><br><br>正在对 55+ 维度全量数据（含 AI 协作技能）进行建模...</div>
        <div id="portraitOutput"></div>
        <div class="btn-group">
            <button class="btn-info" onclick="copyPortrait()">复制 Markdown 源码</button>
            <button class="btn-success" onclick="saveToArchive()">存档至文库 (阅后即焚)</button>
            <button class="btn-gray" onclick="showPage(2)">测评下一位</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <h1>画像档案文库</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn-info" onclick="downloadAllMerged()">全员导出(.md)</button>
                <button class="btn-gray" onclick="showPage(1)">返回首页</button>
            </div>
        </div>
        <div id="libraryContent" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top:25px;"></div>
    </div>
</div>

<script>
// --- 终极核心配置：全维度、含 AI 协作技能与《指南》对齐 ---
const SURVEY_CORE = {
    // 幼儿阶段 (L1-L4 意识/发现/发明/动力)
    preschool: [
        { group: "1. 发育与健康 (对齐《指南》)", items: [
            { id: "p1", label: "家中排行", type: "radio", opts: ["独生子女","老大(有弟妹)","老二(有兄姐)","老三及以后"] },
            { id: "p2", label: "如厕自理情况", type: "radio", opts: ["完全自理","需脱提裤辅助","需提醒","依赖纸尿裤"] },
            { id: "p3", label: "精细动作：固定与对准", type: "checkbox", opts: ["独立精准固定螺丝","需手部辅助发力","无法对准孔位","懂得顺松逆紧逻辑"] },
            { id: "p4", label: "过敏/特殊体质", type: "text", placeholder: "无则留空" }
        ]},
        { group: "2. 社会性与情感表现", items: [
            { id: "p5", label: "混合气质特质 (多选)", type: "checkbox", opts: ["活泼快语","谨慎观察","平和稳重","细腻敏感","执着主见","慢热淡定","精力过人"] },
            { id: "p6", label: "有效安抚策略", type: "checkbox", opts: ["肢体拥抱","注意力转移","具体夸奖","指令引导","陪伴静坐"] },
            { id: "p7", label: "规则/等待意识", type: "radio", opts: ["能自觉轮流","需反复提醒","完全无法等待"] }
        ]},
        { group: "3. 科学探究与机械初步", items: [
            { id: "p8", label: "结构稳定性意识", type: "checkbox", opts: ["主动加固底部","理解垂直支撑","只会盲目向上堆","不顾重力盲搭"] },
            { id: "p9", label: "机械认知：动力/传动", type: "checkbox", opts: ["理解齿轮咬合","理解皮筋传递动力","能完成二级加速","无法区分结构"] }
        ]}
    ],
    // 低段阶段 (L5-SPIKE/WeDo/Kitten 01-02)
    primary_low: [
        { group: "1. 学习习惯与综合素养", items: [
            { id: "l1", label: "识字与文档阅读自助力", type: "radio", opts: ["完全自主阅读","需拼音辅佐","需老师讲解"] },
            { id: "l2", label: "桌面/空间整理习惯", type: "radio", opts: ["分类井然有序","提醒后归位","极其杂乱"] },
            { id: "l3", label: "胜负心理反应", type: "checkbox", opts: ["心态平和","渴望第一","输了易急躁","赢了易自满","在意过程有趣"] }
        ]},
        { group: "2. 专业技能：传感器与基础逻辑", items: [
            { id: "l4", label: "传感器应用逻辑", type: "checkbox", opts: ["熟练感知-判断-动作","理解数值反馈","仅限单一触发","不解条件等待"] },
            { id: "l5", label: "编程逻辑深度", type: "checkbox", opts: ["理解无限循环","能用条件分支","不解嵌套逻辑","能自主排错Debug"] },
            { id: "l6", label: "排障耐心度", type: "radio", opts: ["耐心复查代码","盲目乱拆乱改","直接求助老师"] }
        ]}
    ],
    // 高段专业阶段 (AICODE 01-03 / 英雄 / AI创新)
    primary_high: [
        { group: "1. 核心 AI 协作能力 (AICODE 03 核心)", items: [
            { id: "h1", label: "Prompt 编写逻辑", type: "checkbox", opts: ["层级分明内容精准","能进行多轮迭代","仅限简单一句话提问","过度依赖AI给结果"] },
            { id: "h2", label: "AI 结果验证意识", type: "checkbox", opts: ["主动运行并逻辑纠错","会质疑AI产生的幻觉","直接盲目复制AI代码","不清楚如何修正AI错误"] },
            { id: "h3", label: "AI 工具协同 Debug", type: "checkbox", opts: ["能把报错红字喂给AI","能根据AI提示定位代码","对AI建议无从下手"] }
        ]},
        { group: "2. 专业编程习惯 (文本/图形化衔接)", items: [
            { id: "h4", label: "打字习惯与效率", type: "checkbox", opts: ["标准盲打自如","中英/符号切换熟练","全半角符号常错","单指寻键模式"] },
            { id: "h5", label: "代码规范习惯", type: "radio", opts: ["极致规范主动注释","勉强可读","混乱无排版面条代码"] },
            { id: "h6", label: "MVP 产品迭代意识", type: "radio", opts: ["强(跑通再优化)","一般","求一次过不愿改"] }
        ]},
        { group: "3. 抽象逻辑与信息伦理", items: [
            { id: "h7", label: "问题拆解能力 (Decomposition)", type: "radio", opts: ["能独立拆解多步任务","需关键提示","缺乏规划"] },
            { id: "h8", label: "信息伦理与安全", type: "checkbox", opts: ["有版权意识","理解AI真实性边界","理解账号安全","无此方面意识"] },
            { id: "h9", label: "挫折恢复力 (Resilience)", type: "radio", opts: ["快速重整旗鼓","需较长时间复原","易气馁放弃"] }
        ]}
    ]
};

// --- 数据管理逻辑 (100% 回填与閱后即焚) ---
let studentDB = JSON.parse(localStorage.getItem('stu_full_final_v25')) || [];
let activeStu = null;
let editingIndex = -1;
let currentMD = "";

function handleMainAction() { editingIndex === -1 ? importStudents() : saveEditedStudent(); }

function importStudents() {
    const raw = document.getElementById('batchInput').value.trim();
    if(!raw) return;
    raw.split('\n').forEach(line => {
        const p = line.trim().split(/[,\s\t]+/).filter(i => i);
        if(p.length >= 3) {
            let levelKey = "primary_low";
            const cls = p[2];
            if(/意识|管道|发现|螺丝刀|发明|动力/.test(cls)) levelKey = "preschool";
            if(/AICODE|AI03|代码|英雄|Kitten|二年级|三年级|四年级/.test(cls)) levelKey = "primary_high";
            if(!studentDB.find(s => s.name === p[0])) {
                studentDB.push({ name:p[0], sex:p[1], class:p[2], time:p.slice(3).join(' '), level:levelKey, md:"", progress:{} });
            }
        }
    });
    saveDb(); renderTable(); document.getElementById('batchInput').value = "";
}

function editStu(i) {
    editingIndex = i;
    const s = studentDB[i];
    document.getElementById('batchInput').style.display = 'none';
    document.getElementById('editForm').style.display = 'grid';
    document.getElementById('cancelEditBtn').style.display = 'block';
    document.getElementById('editName').value = s.name;
    document.getElementById('editSex').value = s.sex;
    document.getElementById('editClass').value = s.class;
    document.getElementById('editTime').value = s.time;
    window.scrollTo({top:0, behavior:'smooth'});
}

function saveEditedStudent() {
    const s = studentDB[editingIndex];
    s.name = document.getElementById('editName').value;
    s.sex = document.getElementById('editSex').value;
    s.class = document.getElementById('editClass').value;
    s.time = document.getElementById('editTime').value;
    saveDb(); cancelEdit(); renderTable();
}

function cancelEdit() {
    editingIndex = -1;
    document.getElementById('batchInput').style.display = 'block';
    document.getElementById('editForm').style.display = 'none';
    document.getElementById('cancelEditBtn').style.display = 'none';
}

function saveDb() { localStorage.setItem('stu_full_final_v25', JSON.stringify(studentDB)); }

function renderTable() {
    const tbody = document.querySelector('#stuTable tbody');
    tbody.innerHTML = studentDB.map((s, i) => `
        <tr><td><b>${s.name}</b></td><td>${s.class}</td><td><small>${s.level}</small></td>
        <td>${s.md ? '<span style="color:var(--success)">● 已有画像</span>' : '<span style="color:#999">○ 待测评</span>'}</td>
        <td>
            <button class="btn-warning" style="padding:4px 8px; font-size:11px;" onclick="editStu(${i})">名册修正</button>
            <button class="btn-primary" style="padding:4px 8px; font-size:11px;" onclick="openSurvey('${s.name}')">编辑画像内容</button>
            <button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="delStu(${i})">删除</button>
        </td></tr>`).join('');
}

// --- 问卷核心：全量数据回填 ---
function openSurvey(name) {
    activeStu = studentDB.find(s => s.name === name);
    const container = document.getElementById('dynamicSurvey');
    container.innerHTML = `<div class="section"><h3>档案信息锁定: ${activeStu.name}</h3><textarea id="remark" placeholder="手动记录课堂特别瞬间或 AI 协作表现细节..." oninput="autoSave()">${activeStu.progress.remark || ''}</textarea></div>`;

    SURVEY_CORE[activeStu.level].forEach(group => {
        let html = `<div class="section"><h3>${group.group}</h3><div class="question-grid">`;
        group.items.forEach(item => {
            const savedVal = activeStu.progress[item.id] || "";
            html += `<div class="q-wrap"><label class="q-label">${item.label}</label><div class="opt-group">`;
            if(item.type === "radio" || item.type === "checkbox") {
                item.opts.forEach(o => {
                    const isChecked = Array.isArray(savedVal) ? savedVal.includes(o) : (savedVal === o);
                    html += `<label class="opt-item ${isChecked?'checked':''}">
                        <input type="${item.type}" name="${item.id}" value="${o}" ${isChecked?'checked':''} onchange="autoSave()"> ${o}
                    </label>`;
                });
            } else {
                html += `<input type="text" name="${item.id}" value="${savedVal}" placeholder="${item.placeholder}" oninput="autoSave()">`;
            }
            html += `</div></div>`;
        });
        container.innerHTML += html + `</div></div>`;
    });
    showPage(3); updateProgress();
}

function autoSave() {
    const data = { remark: document.getElementById('remark').value };
    document.querySelectorAll('#dynamicSurvey input').forEach(i => {
        if(i.type === 'checkbox') {
            if(!data[i.name]) data[i.name] = [];
            if(i.checked) data[i.name].push(i.value);
        } else if(i.type === 'radio') {
            if(i.checked) data[i.name] = i.value;
        } else { data[i.name] = i.value; }
    });
    document.querySelectorAll('.opt-item').forEach(l => l.classList.toggle('checked', l.querySelector('input').checked));
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].progress = data; saveDb(); updateProgress();
}

function updateProgress() {
    const total = document.querySelectorAll('.q-wrap').length;
    const done = Object.keys(activeStu.progress).filter(k => k !== 'remark' && activeStu.progress[k].length > 0).length;
    document.getElementById('p-fill').style.width = (total ? (done/total)*100 : 0) + "%";
    document.getElementById('p-text').innerText = `已完成维度观测: ${done}/${total}`;
}

async function generatePortrait() {
    const key = document.getElementById('api_key').value.trim();
    if(!key) return alert("API Key Required");
    showPage(4); document.getElementById('loading').style.display='block';
    
    const cleanData = {};
    for (let k in activeStu.progress) { if (activeStu.progress[k] && activeStu.progress[k].length !== 0) cleanData[k] = activeStu.progress[k]; }

    const prompt = `你是顶级教育数据专家。请将以下测评数据转化为极其精准的“数字化画像数据卡”。
    包含 AI 协作技能、C++ 规范、MVP 思维等硬核指标。数据：${JSON.stringify(cleanData)}。
    要求：
    1. **禁止主观建议**。
    2. 使用 [维度名 | 观测状态 | 专业定义] 映射逻辑。
    3. 特别体现 AI 课程中的“人机协作素养”。
    4. 风格冷峻、数据化、极高密度。`;

    try {
        const res = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
            body:JSON.stringify({model:"glm-4-flash", messages:[{role:"user",content:prompt}]})
        });
        const d = await res.json(); currentMD = d.choices[0].message.content;
        document.getElementById('portraitOutput').innerHTML = `<div class="portrait-card"><div class="p-header"><h2>${activeStu.name}</h2><span>STATUS: AI_ENHANCED</span></div><div class="p-body">${marked.parse(currentMD)}</div></div>`;
    } catch(e) { alert("AI解析出错"); } finally { document.getElementById('loading').style.display='none'; }
}

function saveToArchive() {
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].md = currentMD; saveDb();
    alert("档案已存入/更新库。预览区已置空。");
    currentMD = ""; document.getElementById('portraitOutput').innerHTML = "";
    showPage(5);
}

// --- 通用辅助 ---
function showPage(n) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(`page${n}`).classList.add('active'); if(n===2) renderGrid(); if(n===5) renderLibrary(); window.scrollTo(0,0); }
function renderGrid() { document.getElementById('studentGrid').innerHTML = studentDB.map(s => `<div class="stu-card" onclick="openSurvey('${s.name}')"><b>${s.name}</b><br><small>${s.class}</small></div>`).join(''); }
function renderLibrary() { document.getElementById('libraryContent').innerHTML = studentDB.filter(s => s.md).map(s => `<div class="stu-card" onclick="viewOld('${s.name}')"><h4>${s.name}</h4><small>${s.class}</small></div>`).join(''); }
function viewOld(name) { const s = studentDB.find(st => st.name === name); activeStu = s; currentMD = s.md; showPage(4); document.getElementById('portraitOutput').innerHTML = `<div class="portrait-card"><div class="p-header"><h2>${s.name}</h2><span>ARCHIVE VIEW</span></div><div class="p-body">${marked.parse(s.md)}</div></div>`; }
function delStu(i) { if(confirm("彻底删除？")) { studentDB.splice(i, 1); saveDb(); renderTable(); } }
function exportBackup() { const blob = new Blob([JSON.stringify(studentDB)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'growth_full_database_v25.json'; a.click(); }
function importBackup(input) { const reader = new FileReader(); reader.onload = function(){ studentDB = JSON.parse(reader.result); saveDb(); renderTable(); }; reader.readAsText(input.files[0]); }
function copyPortrait() { navigator.clipboard.writeText(currentMD).then(() => alert("已复制 Markdown")); }
function downloadAllMerged() { const blob = new Blob([studentDB.filter(s => s.md).map(s => `# ${s.name}\n${s.md}`).join('\n\n---\n\n')], {type:'text/markdown'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'all_student_portraits.md'; a.click(); }

window.onload = function() { renderTable(); document.getElementById('api_key').value = localStorage.getItem('zhipu_api_key') || ''; }
</script>
</body>
</html>
