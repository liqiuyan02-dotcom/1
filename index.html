<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育智库 - 360°学生成长画像系统 (终极版)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --success: #059669; --info: #7c3aed; --warning: #d97706; --danger: #dc2626; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: #334155; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1250px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        
        /* 页面流转 */
        .page { display: none; }
        .page.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* API 配置条 */
        .top-nav { background: #fffbe6; padding: 15px 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #ffe58f; display: flex; align-items: center; gap: 20px; }
        .top-nav input { flex-grow: 1; padding: 10px; border: 1px solid #d9d9d9; border-radius: 8px; outline: none; }

        /* 章节/卡片设计 */
        .section { margin: 30px 0; padding: 25px; border: 1px solid #f1f5f9; border-radius: 18px; background: #fff; position: relative; }
        .section h3 { border-left: 5px solid var(--accent); padding-left: 15px; color: var(--primary); margin: 0 0 25px 0; background: #f8fafc; padding-block: 10px; border-radius: 0 8px 8px 0; font-size: 18px; }

        /* 问卷项 */
        .question-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .q-wrap { margin-bottom: 10px; }
        .q-label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 14px; color: #475569; }
        .opt-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .opt-item { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .opt-item:hover { background: #eff6ff; border-color: var(--accent); }
        .opt-item input { margin: 0; width: 16px; height: 16px; accent-color: var(--accent); }

        /* 实时保存进度条 */
        .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .p-bar { height: 10px; background: #edf2f7; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        .p-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.4s; }

        /* 数字化档案卡 */
        .portrait-card { border: 2px solid var(--accent); border-radius: 24px; overflow: hidden; background: #fff; box-shadow: 0 25px 50px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .p-card-head { background: var(--primary); color: #fff; padding: 35px; display: flex; justify-content: space-between; align-items: flex-end; }
        .p-card-head h2 { margin: 0; font-size: 32px; letter-spacing: 2px; }
        .p-card-body { padding: 45px; font-size: 15px; }

        /* 按钮与通用组件 */
        .btn-group { margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-gray { background: #e2e8f0; color: #475569; }
        .btn-warning { background: var(--warning); color: #fff; flex: 0; min-width: 80px; }
        .btn-danger { background: var(--danger); color: #fff; flex: 0; min-width: 80px; }
        button:hover { transform: translateY(-2px); filter: brightness(0.9); }

        textarea, input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .loading { display: none; text-align: center; padding: 60px; color: var(--accent); font-weight: bold; }
        
        .search-box { margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 12px; padding-left: 45px; border-radius: 12px; border: 2px solid var(--border); }
    </style>
</head>

<body>
<div class="container">
    <div class="top-nav">
        <i class="fas fa-lock"></i>
        <strong>API Key:</strong>
        <input type="password" id="api_key" placeholder="在此填入智谱 API Key (数据仅保存在您的浏览器本地)">
    </div>

    <div id="page1" class="page active">
        <div style="text-align:center; margin-bottom:40px;">
            <h1 style="font-size:32px; color:var(--primary); margin-bottom:10px;"><i class="fas fa-database"></i> 360° 学生成长画像数字化系统</h1>
            <p style="color:#64748b;">本地独立存储 • 全维度画像分析 • 课纲深度对齐</p>
        </div>

        <div class="grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
            <button class="btn-info" onclick="showPage(5)" style="height:70px; font-size:18px;"><i class="fas fa-archive"></i> 画像文库 / 汇总导出</button>
            <button class="btn-success" onclick="showPage(2)" style="height:70px; font-size:18px;"><i class="fas fa-user-plus"></i> 选择学生开启新测评</button>
        </div>

        <div class="section" id="entrySection">
            <h3 id="entryTitle"><i class="fas fa-file-import"></i> 智能名单录入 / 重编写</h3>
            <textarea id="batchInput" rows="4" placeholder="粘贴格式：姓名,性别,班级,上课时间 (支持多行)"></textarea>
            
            <div id="editControls" style="display:none; margin-top:15px; background:#f0f9ff; padding:20px; border-radius:15px; border:1px solid var(--accent);">
                <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:15px;">
                    <div><label>姓名</label><input type="text" id="editName"></div>
                    <div><label>性别</label><input type="text" id="editSex"></div>
                    <div><label>班级</label><input type="text" id="editClass"></div>
                    <div><label>上课时间</label><input type="text" id="editTime"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-primary" id="entryBtn" onclick="handleEntry()">✨ 智能识别解析并存入我的名册</button>
                <button class="btn-gray" id="cancelEditBtn" style="display:none;" onclick="cancelEdit()">取消修改</button>
                <button class="btn-gray" style="flex:0; min-width:180px;" onclick="exportBackup()"><i class="fas fa-cloud-download-alt"></i> 导出备份(.json)</button>
                <button class="btn-gray" style="flex:0; min-width:180px;" onclick="document.getElementById('importFile').click()"><i class="fas fa-cloud-upload-alt"></i> 导入备份</button>
                <input type="file" id="importFile" style="display:none" onchange="importBackup(this)">
            </div>
        </div>

        <div class="section">
            <h3><i class="fas fa-users"></i> 我的名册管理</h3>
            <table id="stuTable">
                <thead><tr style="color:#64748b;"><th>姓名</th><th>班级</th><th>学段</th><th>状态</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
            <div style="text-align:right; margin-top:20px;"><button class="btn-danger" onclick="clearAllData()">清空我的全部名册</button></div>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="header" style="text-align:center;"><h1>选择待测评对象</h1></div>
        <div class="search-box" style="position:relative; margin:20px 0;">
            <i class="fas fa-search" style="position:absolute; left:15px; top:15px; color:#94a3b8;"></i>
            <input type="text" id="searchGrid" placeholder="快速检索学生姓名..." oninput="filterCards()">
        </div>
        <div id="studentGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:20px;"></div>
        <div class="btn-group"><button class="btn-gray" onclick="showPage(1)">返回主页</button></div>
    </div>

    <div id="page3" class="page">
        <div class="sticky-header">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; padding:0 10px;">
                <span id="p-text">测评进度: 0/0</span>
                <span id="save-hint" style="color:var(--success);"><i class="fas fa-check-circle"></i> 本地自动保存已开启</span>
            </div>
            <div class="p-bar"><div id="p-fill" class="p-fill"></div></div>
        </div>
        <div id="dynamicSurvey"></div>
        <div class="btn-group">
            <button class="btn-gray" onclick="showPage(2)">← 重选学生</button>
            <button class="btn-primary" onclick="generatePortrait()">✨ 深度交叉分析并绘图画像</button>
        </div>
    </div>

    <div id="page4" class="page">
        <div id="loading" class="loading"><i class="fas fa-atom fa-spin fa-3x"></i><br><br>正在根据 30+ 维度全量数据建模画像...</div>
        <div id="portraitOutput"></div>
        <div class="btn-group">
            <button class="btn-info" onclick="copyPortrait()"><i class="fas fa-copy"></i> 复制画像全文</button>
            <button class="btn-success" onclick="saveToArchive()"><i class="fas fa-archive"></i> 确认并归档至文库</button>
            <button class="btn-gray" onclick="showPage(2)">测评下一位</button>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <h1><i class="fas fa-folder-open"></i> 画像文库</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn-info" style="flex:0; min-width:160px;" onclick="downloadAllMerged()">一键汇总全员 (.md)</button>
                <button class="btn-gray" style="flex:0;" onclick="showPage(1)">返回</button>
            </div>
        </div>
        <div id="libraryContent" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; margin-top:30px;"></div>
    </div>
</div>

<script>
// --- 全维度全学段知识库模版 (基于您的 7 级目录 + AICODE) ---
const SURVEY_CORE = {
    preschool: [
        { group: "1. 幼儿发展基础 (托小中班)", items: [
            { id: "p1", label: "家中排行", type: "radio", opts: ["独生","老大","老二","老三"] },
            { id: "p2", label: "主要教养人", type: "radio", opts: ["父母","祖辈","保姆","混合模式"] },
            { id: "p3", label: "如厕自理情况", type: "radio", opts: ["完全自理","需帮助脱提裤","需老师提醒"] },
            { id: "p4", label: "乐高接触史", type: "radio", opts: ["经常玩","偶尔","从不"] }
        ]},
        { group: "2. 性格气质与社交", items: [
            { id: "p5", label: "气质类型", type: "radio", opts: ["活泼型(快)","谨慎型(慢)","平和型(稳)","敏感型(细)"] },
            { id: "p6", label: "分离焦虑", type: "radio", opts: ["无","轻度(1周)","中度(4周)","明显"] },
            { id: "p7", label: "有效安抚方式", type: "text", placeholder: "如：拥抱、转移注意力、具体表扬" },
            { id: "p8", label: "社交模式", type: "radio", opts: ["主动交友","被动跟随","平行玩耍","独自游戏"] }
        ]},
        { group: "3. 动作与认知 (L1-L4核心)", items: [
            { id: "p9", label: "精细动作(工具固定)", type: "radio", opts: ["螺丝精准固定","需引导力道","手部力量偏弱"] },
            { id: "p10", label: "结构稳定性意识", type: "radio", opts: ["主动加固底部","堆砌为主","理解垂直支撑"] },
            { id: "p11", label: "指令理解", type: "radio", opts: ["完全理解","需简化重复","需动作配合"] },
            { id: "p12", label: "想象力/创作倾向", type: "radio", opts: ["丰富天马行空","模仿范例为主","两者结合"] }
        ]}
    ],
    primary_low: [
        { group: "1. 学习素质与心态", items: [
            { id: "l1", label: "课堂参与度", type: "radio", opts: ["积极举手","被动回答","需鼓励"] },
            { id: "l2", label: "胜负心理反应", type: "radio", opts: ["胜不骄败不馁","赢了开心输了急","情绪波动大"] },
            { id: "l3", label: "提问习惯", type: "radio", opts: ["主动追问为什么","私下问","不问但困惑"] }
        ]},
        { group: "2. 编程与机械核心 (L5-SPIKE)", items: [
            { id: "l4", label: "逻辑思维星级", type: "radio", opts: ["1星","2星","3星","4星","5星"] },
            { id: "l5", label: "空间想象星级", type: "radio", opts: ["1星","2星","3星","4星","5星"] },
            { id: "l6", label: "循环/分支概念", type: "radio", opts: ["逻辑清晰","模糊模仿","初次接触"] },
            { id: "l7", label: "排障调试耐心", type: "radio", opts: ["有耐心重来","一般","急躁易放弃"] }
        ]},
        { group: "3. 学科基础衔接", items: [
            { id: "l8", label: "数学逻辑基础", type: "radio", opts: ["扎实超越年龄","一般","需加强数字感"] },
            { id: "l9", label: "识字与阅读能力", type: "radio", opts: ["自主阅读","需辅助","较弱"] },
            { id: "l10", label: "书写/打字速度", type: "radio", opts: ["快且工整","较慢","需练习"] }
        ]}
    ],
    primary_high: [
        { group: "1. 学习成熟度 (Kitten-AICODE)", items: [
            { id: "h1", label: "自主学习规划力", type: "radio", opts: ["强(规划-执行-复盘)","中","弱"] },
            { id: "h2", label: "困难处理风格", type: "radio", opts: ["查资料解决","问老师","搁置放弃"] },
            { id: "h3", label: "元认知(自评水平)", type: "radio", opts: ["精准评估自己","大概知道","完全不清楚"] }
        ]},
        { group: "2. AI 技术深度评估 (AICODE特色)", items: [
            { id: "h4", label: "键盘盲打水平", type: "radio", opts: ["熟练盲打","准但慢","单指寻键"] },
            { id: "h5", label: "Prompt 编写逻辑", type: "radio", opts: ["精准有效","基本可用","需大幅指导"] },
            { id: "h6", label: "AI 工具协作意识", type: "radio", opts: ["熟练驾驭","机械索取答案","抗拒排斥"] },
            { id: "h7", label: "代码排版规范", type: "radio", opts: ["极致规范","勉强可读","面条式代码"] }
        ]},
        { group: "3. 竞赛与未来志向", items: [
            { id: "h8", label: "抗压能力", type: "radio", opts: ["享受竞赛","目标导向过急","易紧张"] },
            { id: "h9", label: "挫折恢复速度", type: "radio", opts: ["快速恢复","需时间","易气馁"] },
            { id: "h10", label: "职业想法/科技志向", type: "text", placeholder: "如：想成为游戏开发者/科学家" }
        ]}
    ]
};

// --- 数据管理核心 ---
let studentDB = JSON.parse(localStorage.getItem('stu_full_final_v12')) || [];
let activeStu = null;
let editingIndex = -1;
let currentMD = "";

function handleEntry() { editingIndex === -1 ? importStudents() : updateStudent(); }

function importStudents() {
    const raw = document.getElementById('batchInput').value.trim();
    if(!raw) return;
    raw.split('\n').forEach(line => {
        const p = line.trim().split(/[,\s\t]+/).filter(i => i);
        if(p.length >= 3) {
            const cls = p[2];
            let levelKey = "primary_low";
            if(/意识|管道|发现|螺丝刀|发明|动力/.test(cls)) levelKey = "preschool";
            if(/AICODE|AI03|代码|英雄/.test(cls)) levelKey = "primary_high";
            if(!studentDB.find(s => s.name === p[0])) {
                studentDB.push({ name:p[0], sex:p[1], class:cls, time:p.slice(3).join(' '), level:levelKey, md:"", progress:{} });
            }
        }
    });
    saveDb(); renderTable(); document.getElementById('batchInput').value = "";
}

function editStu(i) {
    editingIndex = i;
    const s = studentDB[i];
    document.getElementById('entryTitle').innerText = `编辑学生档案：${s.name}`;
    document.getElementById('editControls').style.display = 'block';
    document.getElementById('batchInput').style.display = 'none';
    document.getElementById('cancelEditBtn').style.display = 'block';
    document.getElementById('editName').value = s.name;
    document.getElementById('editSex').value = s.sex;
    document.getElementById('editClass').value = s.class;
    document.getElementById('editTime').value = s.time;
    document.getElementById('entryBtn').innerText = "保存档案修改";
}

function updateStudent() {
    const s = studentDB[editingIndex];
    s.name = document.getElementById('editName').value;
    s.sex = document.getElementById('editSex').value;
    s.class = document.getElementById('editClass').value;
    s.time = document.getElementById('editTime').value;
    // 重新判断学段
    if(/意识|管道|发现|螺丝刀|发明|动力/.test(s.class)) s.level = "preschool";
    else if(/AICODE|AI03|代码|英雄/.test(s.class)) s.level = "primary_high";
    else s.level = "primary_low";
    saveDb(); cancelEdit(); renderTable();
}

function cancelEdit() {
    editingIndex = -1;
    document.getElementById('editControls').style.display = 'none';
    document.getElementById('batchInput').style.display = 'block';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('entryBtn').innerText = "✨ 智能识别解析并存入我的名册";
}

function saveDb() { localStorage.setItem('stu_full_final_v12', JSON.stringify(studentDB)); }

function renderTable() {
    const tbody = document.querySelector('#stuTable tbody');
    tbody.innerHTML = studentDB.map((s, i) => `
        <tr>
            <td><b>${s.name}</b></td><td>${s.class}</td>
            <td><small style="color:var(--accent)">${s.level}</small></td>
            <td>${s.md ? '<span style="color:var(--success)">✅ 已归档</span>' : '<span style="color:#999">⏳ 待测评</span>'}</td>
            <td>
                <button class="btn-warning" style="padding:4px 8px; font-size:12px;" onclick="editStu(${i})">编辑</button>
                <button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="delStu(${i})">删除</button>
            </td>
        </tr>`).join('');
}

// --- 测评逻辑 ---
function openSurvey(name) {
    activeStu = studentDB.find(s => s.name === name);
    const container = document.getElementById('dynamicSurvey');
    container.innerHTML = `<div class="section">
        <h3>📌 核心基础档案: ${activeStu.name}</h3>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); font-size:13px; color:#666;">
            <div>性别：${activeStu.sex}</div><div>班级：${activeStu.class}</div><div>时间：${activeStu.time}</div><div>学段：${activeStu.level}</div>
        </div>
        <label class="q-label" style="margin-top:20px;">课堂特别观察细节 (AI 将基于此深度润色画像)</label>
        <textarea id="remark" placeholder="在此输入突出的作品细节、情绪变化或家访反馈..." oninput="autoSave()">${activeStu.progress.remark || ''}</textarea>
    </div>`;

    SURVEY_CORE[activeStu.level].forEach(group => {
        let html = `<div class="section"><h3>${group.group}</h3><div class="question-grid">`;
        group.items.forEach(item => {
            const saved = activeStu.progress[item.id] || "";
            html += `<div class="q-wrap"><label class="q-label">${item.label}</label>`;
            if(item.type === "radio") {
                html += `<div class="opt-group">${item.opts.map(o => `<label class="opt-item"><input type="radio" name="${item.id}" value="${o}" ${saved===o?'checked':''} onchange="autoSave()"> ${o}</label>`).join('')}</div>`;
            } else {
                html += `<input type="text" name="${item.id}" value="${saved}" placeholder="${item.placeholder}" oninput="autoSave()">`;
            }
            html += `</div>`;
        });
        container.innerHTML += html + `</div></div>`;
    });
    updatePBar(); showPage(3);
}

function autoSave() {
    const data = { remark: document.getElementById('remark').value };
    document.querySelectorAll('#dynamicSurvey input:checked, #dynamicSurvey input[type=text]').forEach(i => { if(i.name) data[i.name] = i.value; });
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].progress = data;
    saveDb(); updatePBar();
}

function updatePBar() {
    const total = document.querySelectorAll('.q-wrap').length;
    const done = Object.keys(activeStu.progress).filter(k => k !== 'remark' && activeStu.progress[k] !== "").length;
    document.getElementById('p-fill').style.width = (total?(done/total)*100:0) + "%";
    document.getElementById('p-text').innerText = `已完成指标: ${done}/${total}`;
}

// --- AI 画像生成 ---
async function generatePortrait() {
    const key = document.getElementById('api_key').value.trim();
    if(!key) return alert("请先填写 API Key");
    localStorage.setItem('zhipu_api_key', key);

    showPage(4); document.getElementById('loading').style.display='block'; document.getElementById('portraitOutput').innerHTML="";
    const prompt = `你是一位顶尖教育画像专家。请根据以下 30 个维度的测评数据，为学生生成一份“数字化画像档案卡”。
    数据：${JSON.stringify(activeStu.progress)}。
    姓名：${activeStu.name}，班级：${activeStu.class}，学段：${activeStu.level}。
    
    输出要求：
    1. 必须包含 [五维能力量化表]、[360°性格特质深度解析]、[学科/编程技术能力画像]。
    2. **严禁输出**任何建议、未来规划、教师寄语。只准客观描述“他是谁、现在的状态”。
    3. Markdown 格式，多用 Emoji，结尾加粗输出“一句话画像速览”。`;

    try {
        const res = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
            body:JSON.stringify({model:"glm-4-flash", messages:[{role:"user",content:prompt}]})
        });
        const d = await res.json(); currentMD = d.choices[0].message.content;
        renderPortraitCard(activeStu, currentMD);
    } catch(e) { alert("生成失败"); } finally { document.getElementById('loading').style.display='none'; }
}

function renderPortraitCard(stu, md) {
    document.getElementById('portraitOutput').innerHTML = `
        <div class="portrait-card">
            <div class="p-card-head">
                <div><h2>${stu.name}</h2><span style="opacity:0.8;">STUDENT DIGITAL PORTRAIT</span></div>
                <div style="text-align:right; font-size:14px; opacity:0.9;">
                    班级：${stu.class}<br>时间：${stu.time}<br>档案编号：STU-${Date.now().toString().slice(-6)}
                </div>
            </div>
            <div class="p-card-body">${marked.parse(md)}</div>
        </div>`;
}

// --- 备份与同步 ---
function exportBackup() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(studentDB));
    const a = document.createElement('a'); a.href = dataStr;
    a.download = `画像名册备份_${new Date().toLocaleDateString()}.json`; a.click();
}

function importBackup(input) {
    const reader = new FileReader();
    reader.onload = function(){
        try {
            const data = JSON.parse(reader.result);
            if(confirm(`检测到 ${data.length} 条备份数据，确定导入并合并吗？`)) {
                studentDB = data; saveDb(); renderTable();
            }
        } catch(e) { alert("非法文件格式！"); }
    };
    reader.readAsText(input.files[0]);
}

// --- 文库与系统辅助 ---
function showPage(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page${n}`).classList.add('active');
    if(n===2) renderGrid();
    if(n===5) renderLibrary();
    window.scrollTo(0,0);
}

function renderGrid() {
    document.getElementById('studentGrid').innerHTML = studentDB.map(s => `
        <div class="stu-card" onclick="openSurvey('${s.name}')" style="background:#fff; border:1px solid #e2e8f0; padding:25px; border-radius:20px; cursor:pointer; text-align:center;">
            <div style="font-size:22px; font-weight:700;">${s.name}</div>
            <div style="font-size:12px; color:#64748b; margin-top:5px;">${s.class}</div>
            ${s.md?'<div style="color:var(--success); font-size:11px; margin-top:10px;">● 已有画像</div>':''}
        </div>`).join('');
}

function renderLibrary() {
    const docs = studentDB.filter(s => s.md);
    document.getElementById('libraryContent').innerHTML = docs.length ? docs.map(s => `
        <div style="background:#fff; border:1px solid #e2e8f0; padding:20px; border-radius:15px; text-align:center;">
            <h4 style="margin:0;">${s.name}</h4><p style="font-size:12px; color:#666;">${s.class}</p>
            <button class="btn-primary" style="padding:8px; font-size:12px; margin-top:10px;" onclick="viewOld('${s.name}')">查阅画像</button>
        </div>`).join('') : '<p style="grid-column:1/-1; text-align:center; color:#999; padding:50px;">档案库为空，完成测评后点击“归档”即可存入。</p>';
}

function viewOld(name) {
    const s = studentDB.find(st => st.name === name);
    activeStu = s; currentMD = s.md; showPage(4); renderPortraitCard(s, s.md);
}

function downloadAllMerged() {
    const docs = studentDB.filter(s => s.md);
    if(!docs.length) return alert("文库目前没有档案");
    let content = docs.map(s => `# 档案：${s.name} | 班级：${s.class}\n${s.md}\n\n---\n`).join('\n');
    const blob = new Blob([content], {type:'text/markdown'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `全员汇总_${new Date().toLocaleDateString()}.md`; a.click();
}

function saveToArchive() {
    const idx = studentDB.findIndex(s => s.name === activeStu.name);
    studentDB[idx].md = currentMD; saveDb(); alert("已存入档案库！"); showPage(5);
}

function delStu(i) { if(confirm("确定删除？")) { studentDB.splice(i, 1); saveDb(); renderTable(); } }
function clearAllData() { if(confirm("警告：将清空所有数据！")) { studentDB = []; saveDb(); renderTable(); } }
function copyPortrait() { navigator.clipboard.writeText(currentMD).then(() => alert("画像文本已复制")); }
function filterCards() { const v = document.getElementById('searchGrid').value.toLowerCase(); document.querySelectorAll('.stu-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v)?'':'none'); }

window.onload = function() {
    renderTable();
    const key = localStorage.getItem('zhipu_api_key');
    if(key) document.getElementById('api_key').value = key;
}
</script>
</body>
</html>
