<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小Q老师 - 星际闯关指挥中心 </title>
<style>
    :root {
        --primary: #ff6b6b;
        --secondary: #4ecdc4;
        --tertiary: #45b7d1;
        --gold: #ffd700;
        --pink: #ff8fab;
        --purple: #9b59b6;
        --green: #2ecc71;
        --yellow: #f1c40f;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        background-color: var(--bg-color);
        background-image: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
        margin: 0; padding: 20px; color: #333; min-height: 100vh;
    }
    h1 { text-align: center; color: #2c3e50; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); letter-spacing: 1px; margin-bottom: 30px; }
    
    .day-group { margin-bottom: 35px; background: rgba(255,255,255,0.4); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    .day-title { font-size: 1.8em; color: #2c3e50; border-bottom: 3px solid var(--secondary); padding-bottom: 8px; margin-bottom: 20px; font-weight: 800; display: flex; align-items: baseline; gap: 10px; }
    
    /* 班级标题行与通知折叠面板 */
    .class-header-row { display: flex; align-items: center; justify-content: space-between; margin: 25px 0 15px 0; flex-wrap: wrap; gap: 10px; }
    .class-section-title { font-size: 1.2em; color: #34495e; padding: 6px 12px; background: linear-gradient(to right, #e0eafc, #cfdef3); border-left: 5px solid var(--primary); border-radius: 4px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; margin: 0; }
    
    .reminder-btn { background: #fff; border: 1px solid var(--secondary); color: var(--secondary); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .reminder-btn:hover { background: var(--secondary); color: white; transform: translateY(-2px); }
    
    .reminder-panel { display: none; background: #f0f7ff; border: 1px dashed #cce5ff; border-radius: 10px; padding: 15px; margin-bottom: 20px; animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .reminder-content-wrapper { display: flex; gap: 15px; align-items: stretch; }
    .reminder-preview { flex: 1; background: white; padding: 12px; border-radius: 8px; border: 1px solid #e1ecf4; font-size: 0.95em; color: #444; white-space: pre-wrap; line-height: 1.6; }
    .reminder-actions { display: flex; flex-direction: column; gap: 10px; width: 90px; }
    .reminder-actions button { border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
    .btn-refresh { background: #f39c12; } .btn-refresh:hover { background: #e67e22; }
    .btn-copy { background: var(--secondary); flex: 1; } .btn-copy:hover { background: #2c3e50; }

    /* 学生卡片 */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 10px; }
    .student-card { background: var(--card-bg); border-radius: 12px; padding: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: all 0.3s; border-left: 6px solid var(--secondary); position: relative; overflow: hidden; }
    .student-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(58, 123, 213, 0.2); border-left-color: var(--primary); }
    
    .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .student-name { font-size: 1.3em; font-weight: 800; color: #2c3e50; display: flex; align-items: center; gap: 5px; }
    .student-nickname { font-size: 0.7em; color: #e67e22; background: rgba(230, 126, 34, 0.1); padding: 2px 8px; border-radius: 10px; font-weight: normal; }
    .copy-icon { font-size: 0.8em; cursor: pointer; color: #7f8c8d; transition: 0.2s; padding: 2px; }
    .copy-icon:hover { color: var(--secondary); transform: scale(1.2); }

    .student-info { font-size: 0.9em; color: #607d8b; margin-bottom: 4px; display: flex; align-items: center; }
    .student-info::before { content: '•'; color: var(--secondary); margin-right: 5px; font-size: 1.2em; }

    .stats-container { margin-top: 12px; padding-top: 12px; border-top: 2px dashed #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 0.92em; font-weight: bold; }
    .stat-attend { color: var(--secondary); }
    .stat-reward { color: #f39c12; }
    .highlight-score { color: #e74c3c; font-size: 1.25em; margin: 0 3px; }

    /* --- 模态框 (星际地图) --- */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-content { background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); width: 95%; max-width: 650px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0, 210, 255, 0.3); color: #fff; border: 1px solid rgba(0, 210, 255, 0.2); }
    .modal-content::-webkit-scrollbar { width: 8px; }
    .modal-content::-webkit-scrollbar-track { background: #090A0F; border-radius: 10px; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

    .map-header { position: sticky; top: 0; background: rgba(9, 10, 15, 0.95); backdrop-filter: blur(10px); text-align: center; padding: 20px; border-bottom: 1px solid rgba(0, 210, 255, 0.3); z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    .map-header h2 { font-size: 1.8em; margin: 0 0 5px 0; text-shadow: 0 0 10px var(--primary); display: flex; justify-content: center; align-items: center; gap: 8px; }
    .map-header p { color: rgba(255,255,255,0.8); margin: 0 0 10px 0; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2em; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; z-index: 101; }
    .close-btn:hover { color: #ff7675; transform: rotate(90deg); }

    .action-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
    .action-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85em; transition: all 0.3s; }
    .action-btn:hover { background: rgba(0, 210, 255, 0.3); border-color: var(--primary); transform: translateY(-2px); }
    .action-btn.danger { background: linear-gradient(to right, #eb3349, #f45c43); border: none; box-shadow: 0 5px 15px rgba(235, 51, 73, 0.4); }

    /* 战报面板 */
    .report-panel { background: rgba(0, 0, 0, 0.6); border-radius: 10px; padding: 15px; margin-top: 15px; border: 1px dashed var(--primary); display: none; text-align: left; }
    .report-panel textarea { width: 100%; height: 120px; background: rgba(255, 255, 255, 0.05); color: #fff; border: none; border-radius: 5px; padding: 10px; font-family: inherit; font-size: 0.95em; resize: none; outline: none; }
    .report-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
    .report-actions button { background: var(--secondary); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85em; transition: 0.3s; }
    .report-actions button:hover { background: var(--primary); }

    /* 星际地图绘制 */
    .map-container { display: flex; flex-direction: column; align-items: center; position: relative; padding: 50px 0 80px 0; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 5px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px), radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px); background-size: 550px 550px, 350px 350px, 250px 250px; background-position: 0 0, 40px 60px, 130px 270px; }
    .treasure-path { stroke-dasharray: 15, 15; animation: flow 1.5s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -30; } }
    .level-row { width: 100%; display: flex; justify-content: center; margin: 45px 0; position: relative; z-index: 2; }
    .level-row:nth-child(even) { transform: translateX(-80px); }
    .level-row:nth-child(odd) { transform: translateX(80px); }
    .node-wrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 70px; }
    .current-week-tag { position: absolute; top: -75px; background: #e74c3c; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.85em; font-weight: bold; box-shadow: 0 0 10px rgba(231, 76, 60, 0.6); animation: bounce 1.5s infinite; white-space: nowrap; z-index: 20; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .course-title-label { position: absolute; top: -45px; white-space: nowrap; background: rgba(0, 0, 0, 0.6); color: var(--primary); padding: 6px 12px; border-radius: 15px; font-size: 0.9em; font-weight: bold; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); border: 1px solid rgba(0, 210, 255, 0.5); pointer-events: none; z-index: 10; backdrop-filter: blur(2px); }
    
    .level-node { width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(145deg, #2c3e50, #000); color: rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.4em; cursor: pointer; border: 3px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5); transition: all 0.4s; user-select: none; position: relative; z-index: 5;}
    .level-node:hover { transform: scale(1.15); border-color: var(--primary); color: white; box-shadow: 0 0 20px var(--primary); }
    .level-node.completed { background: linear-gradient(145deg, #ffd700, #f39c12); border-color: #fff; color: #fff; text-shadow: 0 0 5px #c0392b; box-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold), inset 0 0 10px rgba(255,255,255,0.8); animation: pulse-gold 2s infinite; }
    @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold); } 50% { box-shadow: 0 0 50px var(--gold), 0 0 100px var(--gold); } }

    .score-controller { position: absolute; left: 100%; margin-left: 25px; display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.1); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); user-select: none; backdrop-filter: blur(5px); z-index: 5; min-width: 100px;}
    .stars-display { font-size: 1.1em; margin-bottom: 6px; letter-spacing: 2px; text-shadow: 0 0 8px rgba(255, 215, 0, 0.8); min-height: 20px; display: flex; justify-content: center; flex-wrap: wrap; max-width: 90px;}
    .score-buttons-row { display: flex; align-items: center; gap: 5px; }
    .score-btn { width: 32px; height: 32px; border-radius: 50%; border: none; font-weight: bold; font-size: 1.4em; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; color: #fff; }
    .score-btn:hover { transform: scale(1.1); }
    .score-btn.minus { background: linear-gradient(to bottom, #e74c3c, #c0392b); }
    .score-btn.plus { background: linear-gradient(to bottom, #2ecc71, #27ae60); }
    .score-display { min-width: 28px; text-align: center; margin: 0 10px; font-weight: 800; color: var(--gold); font-size: 1.2em; text-shadow: 0 0 10px var(--gold); }

    /* 月全勤宝箱样式 */
    .treasure-chest-box { position: absolute; right: 100%; margin-right: 25px; font-size: 2.5em; cursor: pointer; transition: 0.3s; user-select: none; z-index: 10; }
    .chest-locked { opacity: 0.4; filter: grayscale(100%); cursor: not-allowed; }
    .chest-unlockable { animation: shake-glow 1.5s infinite; filter: drop-shadow(0 0 15px var(--gold)); }
    .chest-opened { opacity: 1; filter: drop-shadow(0 0 20px #2ecc71); transform: scale(1.2); cursor: default; animation: chestOpen 0.5s ease-out; }
    @keyframes chestOpen {
        0% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(1.3) rotate(10deg); }
        100% { transform: scale(1.2) rotate(0deg); }
    }

    /* 🏆 终极大奖箱样式 */
    .grand-chest-container { display: flex; justify-content: center; padding: 40px 20px; position: relative; z-index: 5; }
    .grand-chest { font-size: 4em; cursor: pointer; transition: all 0.3s; user-select: none; filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5)); }
    .grand-chest.locked { animation: grand-shake 2s infinite; }
    .grand-chest.opened { filter: drop-shadow(0 0 20px #2ecc71); transform: scale(1.2); cursor: default; }
    .grand-chest.unlockable:hover { transform: scale(1.15); filter: drop-shadow(0 0 30px gold); }
    @keyframes grand-shake { 0%, 100% { transform: scale(1) rotate(0deg); } 25% { transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 0 25px gold); } 75% { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 25px gold); } }

    /* 大奖弹窗样式 */
    .prize-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(10px); }
    .prize-content { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 50px; border-radius: 30px; text-align: center; max-width: 500px; border: 3px solid gold; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); animation: prizePop 0.5s ease-out; }
    @keyframes prizePop { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .prize-icon { font-size: 5em; margin-bottom: 20px; display: block; animation: bounce 1s infinite; }
    .prize-level { font-size: 2em; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px currentColor; }
    .prize-text { font-size: 1.3em; color: #fff; margin-bottom: 25px; line-height: 1.6; }
    .prize-close-btn { background: linear-gradient(135deg, #ffd700, #ff6b6b); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .prize-close-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }

    /* 🐾 萌宠闪卡样式 */
    .pet-card-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.92); display: none; justify-content: center; align-items: center; z-index: 10001; backdrop-filter: blur(15px); }
    .pet-card { background: linear-gradient(145deg, #2d3436 0%, #000 100%); width: 320px; border-radius: 20px; padding: 30px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(255, 215, 0, 0.4); animation: cardAppear 0.6s ease-out; }
    .pet-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent 0deg, var(--pet-color, gold) 60deg, transparent 120deg); animation: rotate 3s linear infinite; opacity: 0.3; }
    .pet-card::after { content: ''; position: absolute; inset: 3px; background: linear-gradient(145deg, #2d3436 0%, #000 100%); border-radius: 18px; z-index: 0; }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    @keyframes cardAppear {
        0% { transform: scale(0.1) rotateY(180deg); opacity: 0; }
        20% { transform: scale(0.5) rotateY(90deg); }
        50% { transform: scale(1.2) rotateY(10deg); filter: drop-shadow(0 0 30px var(--pet-color, gold)); }
        100% { transform: scale(1) rotateY(0deg); opacity: 1; filter: drop-shadow(0 0 20px var(--pet-color, gold)); }
    }
    
    .pet-card-shake { animation: shakeLoad 0.8s ease-in-out; }
    @keyframes shakeLoad {
        0%, 100% { transform: translateX(0) rotate(0deg); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-8px) rotate(-3deg); }
        20%, 40%, 60%, 80% { transform: translateX(8px) rotate(3deg); }
    }
    
    .pet-icon-wrapper { position: relative; z-index: 1; font-size: 6em; margin-bottom: 15px; animation: petBounce 1s ease-in-out infinite; filter: drop-shadow(0 0 20px var(--pet-color, gold)); }
    @keyframes petBounce {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-15px) scale(1.1); filter: drop-shadow(0 0 30px var(--pet-color, gold)); }
    }
    
    /* 解锁特效 */
    .unlock-effect {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, var(--pet-color, gold) 0%, transparent 70%);
        animation: unlockPulse 1s ease-out;
        pointer-events: none;
        z-index: 100;
    }
    @keyframes unlockPulse {
        0% { transform: scale(0); opacity: 1; }
        100% { transform: scale(2); opacity: 0; }
    }
    
    .pet-name { position: relative; z-index: 1; font-size: 1.5em; font-weight: bold; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px var(--pet-color, gold); }
    .pet-level-badge { position: relative; z-index: 1; display: inline-block; padding: 5px 20px; border-radius: 20px; font-weight: bold; font-size: 1.1em; margin-bottom: 15px; border: 2px solid; animation: levelGlow 2s ease-in-out infinite; }
    @keyframes levelGlow { 0%, 100% { box-shadow: 0 0 10px currentColor; } 50% { box-shadow: 0 0 25px currentColor, 0 0 40px currentColor; } }
    
    .pet-power-title { position: relative; z-index: 1; color: #aaa; font-size: 0.9em; margin-bottom: 8px; }
    .pet-power { position: relative; z-index: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; color: #fff; font-size: 1em; line-height: 1.5; margin-bottom: 15px; }
    .pet-desc { position: relative; z-index: 1; color: #888; font-size: 0.9em; font-style: italic; margin-bottom: 20px; }
    .pet-card-close { position: relative; z-index: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .pet-card-close:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.6); }
    .pet-card-close.small { padding: 12px 15px; font-size: 0.9em; }
    .pet-card-buttons { position: relative; z-index: 1; display: flex; gap: 10px; justify-content: center; }
    .pet-reroll-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-size: 0.9em; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .pet-reroll-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(240, 147, 251, 0.6); }
    .pet-reroll-btn:disabled { background: #666; cursor: not-allowed; opacity: 0.5; transform: none; box-shadow: none; }
    .reroll-cost { position: relative; z-index: 1; color: #ffd700; font-size: 0.85em; margin-top: 8px; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }

    /* 📖 萌宠图鉴样式 */
    .collection-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 10002; backdrop-filter: blur(15px); }
    .collection-content { background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%); width: 90%; max-width: 800px; max-height: 85vh; border-radius: 20px; padding: 30px; position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(102, 126, 234, 0.4); }
    .collection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); }
    .collection-title { font-size: 1.8em; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 10px; }
    .collection-stats { color: #ffd700; font-size: 1em; }
    .collection-close { font-size: 2em; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; }
    .collection-close:hover { color: #ff7675; transform: rotate(90deg); }
    .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; max-height: 55vh; overflow-y: auto; padding-right: 10px; }
    .collection-grid::-webkit-scrollbar { width: 6px; }
    .collection-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
    .collection-grid::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 3px; }
    .pet-collection-item { aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; border: 2px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
    .pet-collection-item:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
    .pet-collection-item.locked { opacity: 0.3; filter: grayscale(100%); cursor: not-allowed; }
    .pet-collection-item.locked:hover { transform: none; border-color: rgba(255,255,255,0.1); box-shadow: none; }
    .pet-collection-icon { font-size: 2.5em; margin-bottom: 5px; }
    .pet-collection-name { font-size: 0.75em; color: #fff; text-align: center; padding: 0 5px; }
    .pet-collection-level { font-size: 0.6em; padding: 2px 8px; border-radius: 10px; margin-top: 3px; font-weight: bold; }
    .pet-collection-item .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); font-size: 2em; }
    @keyframes shake-glow { 0%, 100% { transform: scale(1) rotate(0deg); } 25% { transform: scale(1.2) rotate(-10deg); filter: drop-shadow(0 0 20px var(--gold)); } 75% { transform: scale(1.2) rotate(10deg); filter: drop-shadow(0 0 20px var(--gold)); } }

    /* 悬浮文字动画 */

function getWeekNum(maxLevels) {
    const startDate = new Date("2026-03-02T00:00:00");
    const diffDays = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
    let weekNum = Math.floor(diffDays / 7) + 1;
    if (weekNum < 1) weekNum = 1;
    if (maxLevels && weekNum > maxLevels) weekNum = maxLevels;
    return weekNum;
}

function drawTreasurePath() {
    const container = document.getElementById('mapContainer');
    let oldSvg = document.getElementById('treasurePathSvg'); if (oldSvg) oldSvg.remove();
    const nodes = container.querySelectorAll('.node-wrapper'); if (nodes.length < 2) return;

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'treasurePathSvg'; svg.style.position = 'absolute'; svg.style.top = '0'; svg.style.left = '0'; svg.style.width = '100%'; svg.style.height = '100%'; svg.style.zIndex = '1'; svg.style.pointerEvents = 'none';

    let pathD = ''; const containerRect = container.getBoundingClientRect();
    for (let i = 0; i < nodes.length; i++) {
        const rect = nodes[i].getBoundingClientRect(); const x = rect.left - containerRect.left + rect.width / 2; const y = rect.top - containerRect.top + rect.height / 2;
        if (i === 0) pathD += `M ${x} ${y} `;
        else {
            const prevRect = nodes[i - 1].getBoundingClientRect(); const prevX = prevRect.left - containerRect.left + prevRect.width / 2; const prevY = prevRect.top - containerRect.top + prevRect.height / 2;
            pathD += `C ${prevX} ${prevY + (y - prevY) / 2}, ${x} ${prevY + (y - prevY) / 2}, ${x} ${y} `;
        }
    }
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathD); path.setAttribute('fill', 'none'); path.setAttribute('stroke', '#00d2ff'); path.setAttribute('stroke-width', '6'); path.setAttribute('stroke-linecap', 'round'); path.setAttribute('class', 'treasure-path'); 
    svg.appendChild(path); container.insertBefore(svg, container.firstChild);
}

// ✨ 独立更新宝箱UI功能，避免重新渲染导致动画丢失
function updateAllChestsUI(records) {
    const rows = document.querySelectorAll('.level-row');
    rows.forEach((row, idx) => {
        if ((idx + 1) % 4 === 0) {
            let chestBox = row.querySelector('.treasure-chest-box');
            if(!chestBox) return;
            let isPerfect = true;
            for(let c = idx - 3; c <= idx; c++) { if(!records[c] || !records[c].attended) isPerfect = false; }

            if(isPerfect) {
                if(records[idx].chestOpened) {
                    // 已开启的宝箱显示随机萌宠
                    const petIcon = records[idx].petIcon || petIcons[Math.floor(Math.random() * petIcons.length)];
                    if(!records[idx].petIcon) { records[idx].petIcon = petIcon; saveAttendanceData(currentStudentId, records); }
                    chestBox.innerHTML = petIcon; chestBox.className = 'treasure-chest-box chest-opened'; chestBox.title = `点击查看萌宠：${petIcon}`; 
                    chestBox.onclick = () => showPetCardFromIcon(petIcon, idx);
                } else {
                    chestBox.innerHTML = '🧰'; chestBox.className = 'treasure-chest-box chest-unlockable'; chestBox.title = "点击开启月全勤宝箱！";
                    chestBox.onclick = () => {
                        records[idx].chestOpened = true; records[idx].score += 5;
                        const petIcon = petIcons[Math.floor(Math.random() * petIcons.length)];
                        records[idx].petIcon = petIcon;
                        saveAttendanceData(currentStudentId, records);
                        updateAllChestsUI(records); // 再次刷新自身UI
                        row.querySelector('.score-display').innerText = records[idx].score; // 同步加分显示
                        const starsDisplay = document.getElementById(`stars-${idx}`);
                        if(starsDisplay) starsDisplay.innerHTML = '⭐'.repeat(Math.min(records[idx].score, 5)); // 同步星星显示
                        
                        // 显示萌宠闪卡
                        showPetCard(petIcon, idx);
                        
                        if(document.getElementById('reportPanel').style.display === 'block') generateReportText();
                    };
                }
            } else {
                chestBox.innerHTML = '🔒'; chestBox.className = 'treasure-chest-box chest-locked'; chestBox.title = "连续点亮4节课即可开启宝箱！"; chestBox.onclick = null;
            }
        }
    });
}

        // 月全勤宝箱 (每4关初始化占位，具体状态由 updateAllChestsUI 统一控制)
        if ((i + 1) % 4 === 0) {
            const chestBox = document.createElement('div'); chestBox.className = 'treasure-chest-box';
            wrapper.appendChild(chestBox);
        }

        if (i === currentWeekIdx) {

        }

        if (records[i].attended) { node.classList.add('completed'); node.innerHTML = '🌟'; } else node.innerHTML = i + 1;
        
        // ✨ 修改为局部刷新，保留漂浮动画
        node.onclick = () => { 
            records[i].attended = !records[i].attended; 
            saveAttendanceData(currentStudentId, records); 
            
            if (records[i].attended) {
                node.classList.add('completed'); node.innerHTML = '🌟';
                triggerFloatText(wrapper, '能量充满!', '#f1c40f');
            } else {
                node.classList.remove('completed'); node.innerHTML = i + 1;
            }
            updateAllChestsUI(records); // 仅刷新宝箱状态，不重载地图
            if(document.getElementById('reportPanel').style.display === 'block') generateReportText(); 
        };

        const scoreCtrl = document.createElement('div'); scoreCtrl.className = 'score-controller';
        scoreCtrl.innerHTML = `<div class="stars-display" id="stars-${i}">${'⭐'.repeat(Math.min(records[i].score || 0, 5))}</div><div class="score-buttons-row"><button class="score-btn minus">－</button><div class="score-display">${records[i].score || 0}</div><button class="score-btn plus">＋</button></div>`;
        const scoreVal = scoreCtrl.querySelector('.score-display');
        
        scoreCtrl.querySelector('.minus').onclick = () => { 
            if(records[i].score>0){ 
                records[i].score--; saveAttendanceData(currentStudentId, records); 
                scoreVal.innerText = records[i].score;
                document.getElementById(`stars-${i}`).innerHTML = '⭐'.repeat(Math.min(records[i].score, 5));
                triggerFloatText(scoreCtrl, '-1', '#e74c3c');
                if(document.getElementById('reportPanel').style.display === 'block') generateReportText(); 
            } 
        };
        scoreCtrl.querySelector('.plus').onclick = () => { 
            records[i].score++; saveAttendanceData(currentStudentId, records); 
            scoreVal.innerText = records[i].score;
            document.getElementById(`stars-${i}`).innerHTML = '⭐'.repeat(Math.min(records[i].score, 5));
            triggerFloatText(scoreCtrl, '+1', '#2ecc71');
            if(document.getElementById('reportPanel').style.display === 'block') generateReportText(); 
        };

        wrapper.appendChild(node); wrapper.appendChild(scoreCtrl); row.appendChild(wrapper); container.appendChild(row);
    }
    
    // 初始化完成后，统一计算并渲染一次宝箱外观
    updateAllChestsUI(records);
    
    // 🏆 添加终极大奖箱（在20关之后）
    if (totalLevels >= 20) {
        addGrandPrizeChest(container, records, totalLevels);
    }
    
    setTimeout(drawTreasurePath, 50);
}

        }

    // 检查大奖是否已领取
    const grandPrizeData = localStorage.getItem(currentStudentId + '_grandPrize');
    const grandPrize = grandPrizeData ? JSON.parse(grandPrizeData) : null;
    
    let chestClass = 'grand-chest locked';
    let chestIcon = '🔒';
    let chestTitle = '通关全部20关即可开启终极大奖箱！';
    let clickHandler = null;
    
    if (allCompleted) {
        if (grandPrize) {
            // 已领取
            chestClass = 'grand-chest opened';
            chestIcon = grandPrize.icon || '🏆';
            chestTitle = `已获得：${grandPrize.level} - ${grandPrize.prize}`;
        } else {
            // 可开启
            chestClass = 'grand-chest unlockable';
            chestIcon = '🎁';
            chestTitle = '🎉 恭喜通关！点击开启终极大奖！';
            clickHandler = () => openGrandPrize(records);
        }
    }
    
    grandChestDiv.innerHTML = `<div class="${chestClass}" title="${chestTitle}">${chestIcon}</div>`;
    
    if (clickHandler) {
        grandChestDiv.querySelector('.grand-chest').onclick = clickHandler;
    }
    
    container.appendChild(grandChestDiv);
}

// 🎁 开启终极大奖
function openGrandPrize(records) {
    // 随机抽奖（设置不同概率）
    const rand = Math.random();
    let prizeIndex;
    if (rand < 0.05) { // 5% 特等奖
        prizeIndex = 0;
    } else if (rand < 0.20) { // 15% 一等奖
        prizeIndex = 1;
    } else if (rand < 0.50) { // 30% 二等奖
        prizeIndex = 2;
    } else { // 50% 三等奖
        prizeIndex = 3;
    }
    
    const prize = grandPrizes[prizeIndex];
    
    // 保存获奖信息
    localStorage.setItem(currentStudentId + '_grandPrize', JSON.stringify(prize));
    
    // 显示弹窗
    document.getElementById('prizeIcon').textContent = prize.icon;
    document.getElementById('prizeLevel').textContent = prize.level;
    document.getElementById('prizeLevel').style.color = prize.color;
    document.getElementById('prizeText').textContent = prize.prize;
    document.getElementById('prizeModal').style.display = 'flex';
    
    // 重新渲染地图以更新宝箱状态
    renderMap();
}

// 关闭大奖弹窗
function closePrizeModal() {
    document.getElementById('prizeModal').style.display = 'none';
}

// 🐾 显示萌宠闪卡
function showPetCard(petIcon, weekIndex = -1) {
    const petData = petDatabase[petIcon] || { name: '神秘萌宠', level: 'R', power: '未知能力', desc: '来自遥远星系的神秘访客' };
    const levelColor = levelColors[petData.level] || '#ffd700';
    const levelName = levelNames[petData.level] || '稀有';
    
    const modal = document.getElementById('petCardModal');
    const card = document.getElementById('petCard');
    
    // 设置闪卡内容
    document.getElementById('petCardIcon').textContent = petIcon;
    document.getElementById('petCardName').textContent = petData.name;
    document.getElementById('petCardLevel').textContent = `${petData.level} ${levelName}`;
    document.getElementById('petCardLevel').style.color = levelColor;
    document.getElementById('petCardLevel').style.borderColor = levelColor;
    document.getElementById('petCardPower').textContent = petData.power;
    document.getElementById('petCardDesc').textContent = petData.desc;
    
    // 设置图标（使用图片或emoji）
    const iconWrapper = document.getElementById('petCardIcon');
    if (petData.img) {
        iconWrapper.innerHTML = `<img src="${petData.img}" style="width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 20px ${levelColor});">`;
    } else {
        iconWrapper.textContent = petIcon;
    }
    
    // 设置主题色
    card.style.setProperty('--pet-color', levelColor);
    
    // 保存当前周索引
    document.getElementById('currentPetWeek').value = weekIndex;
    
    // 获取全部积分总和并更新按钮状态
    const records = getAttendanceData(currentStudentId, totalLevels);
    const totalScore = records.reduce((sum, r) => sum + (r.score || 0), 0);
    document.getElementById('rerollCost').textContent = `总积分：${totalScore} ⭐`;
    
    const rerollBtn = document.getElementById('petRerollBtn');
    rerollBtn.disabled = totalScore < 3; // 总积分不足3分时禁用按钮
    
    // 显示弹窗
    modal.style.display = 'flex';
    
    // 添加抖动加载动画
    card.classList.remove('pet-card-shake');
    setTimeout(() => card.classList.add('pet-card-shake'), 10);
}

// 🐾 图鉴数据存储功能
function getPetCollectionData() {
    const data = localStorage.getItem(currentStudentId + '_petCollection');
    return data ? JSON.parse(data) : {};
}

function savePetCollectionData(petCollection) {
    localStorage.setItem(currentStudentId + '_petCollection', JSON.stringify(petCollection));
}

// 添加萌宠到图鉴
function addPetToCollection(petIcon) {
    const collection = getPetCollectionData();
    collection[petIcon] = (collection[petIcon] || 0) + 1;
    savePetCollectionData(collection);
}

// 关闭萌宠闪卡
function closePetCard() {
    // 获取当前显示的萌宠图标
    const petIcon = document.getElementById('petCardIcon').textContent;
    // 添加到图鉴
    addPetToCollection(petIcon);
    document.getElementById('petCardModal').style.display = 'none';
    showToast('🎉 萌宠已收入图鉴！');
}

// 📖 显示萌宠图鉴
function showPetCollection() {
    const modal = document.getElementById('collectionModal');
    const grid = document.getElementById('collectionGrid');
    const stats = document.getElementById('collectionStats');
    
    // 获取已收集的萌宠及其数量（使用独立的图鉴存储）
    const petCounts = getPetCollectionData();
    
    // 更新统计
    const collectedTypes = Object.keys(petCounts).length;
    stats.textContent = `已收集：${collectedTypes}/${petIcons.length}`;
    
    // 生成图鉴格子
    grid.innerHTML = '';
    
    petIcons.forEach(petIcon => {
        const petData = petDatabase[petIcon];
        const count = petCounts[petIcon] || 0;
        const isCollected = count > 0;
        const levelColor = levelColors[petData.level] || '#fff';
        // 检查是否有图片
        const iconDisplay = petData.img ? `<img src="${petData.img}" style="width: 40px; height: 40px; object-fit: contain;">` : petIcon;
        
        const item = document.createElement('div');
        item.className = `pet-collection-item ${isCollected ? '' : 'locked'}`;
        
        if(isCollected) {
            item.innerHTML = `
                <div class="pet-collection-icon">${iconDisplay}</div>
                <div class="pet-collection-name">${petData.name}</div>
                <div class="pet-collection-level" style="background: ${levelColor}; color: #fff;">${petData.level}</div>
                ${count > 1 ? `<div style="font-size: 0.6em; color: var(--gold); font-weight: bold; margin-top: 3px;">x${count}</div>` : ''}
            `;
            item.onclick = () => showPetCard(petIcon, -1);
        } else {
            item.innerHTML = `
                <div class="pet-collection-icon">❓</div>
                <div class="pet-collection-name">???</div>
                <div class="locked-overlay">🔒</div>
            `;
        }
        
        grid.appendChild(item);
    });
    
    modal.style.display = 'flex';
}

// 关闭萌宠图鉴
function closeCollectionModal() {
    document.getElementById('collectionModal').style.display = 'none';
}

// 从闪卡打开图鉴
function openCollectionFromCard() {
    document.getElementById('petCardModal').style.display = 'none';
    setTimeout(() => showPetCollection(), 100);
}

// 点击萌宠图标也可以查看闪卡
function showPetCardFromIcon(petIcon, weekIndex = -1) {
    if(petIcon && petDatabase[petIcon]) {
        showPetCard(petIcon, weekIndex);
    }
}

// 🔄 重抽萌宠
function rerollPet() {
    const weekIndex = parseInt(document.getElementById('currentPetWeek').value);
    if(weekIndex < 0) {
        showToast('⚠️ 无法重抽，请重新打开宝箱');
        return;
    }
    
    const records = getAttendanceData(currentStudentId, totalLevels);
    const totalScore = records.reduce((sum, r) => sum + (r.score || 0), 0);
    
    if(totalScore < 3) {
        showToast('⚠️ 总积分不足，无法重抽');
        return;
    }
    
    // 从总积分中扣除3分（优先从当前周开始，不够再往前扣）
    let remainingDeduction = 3;
    for(let i = weekIndex; i >= 0 && remainingDeduction > 0; i--) {
        if(records[i] && records[i].score > 0) {
            const deduct = Math.min(records[i].score, remainingDeduction);
            records[i].score -= deduct;
            remainingDeduction -= deduct;
        }
    }
    // 如果前面的周不够，从后面的周扣
    if(remainingDeduction > 0) {
        for(let i = 0; i < records.length && remainingDeduction > 0; i++) {
            if(records[i] && records[i].score > 0) {
                const deduct = Math.min(records[i].score, remainingDeduction);
                records[i].score -= deduct;
                remainingDeduction -= deduct;
            }
        }
    }
    
    // 重新随机萌宠（排除当前的）
    const currentPet = records[weekIndex].petIcon;
    let availablePets = petIcons.filter(p => p !== currentPet);
    if(availablePets.length === 0) availablePets = petIcons; // 防止只有一种的情况
    
    const newPetIcon = availablePets[Math.floor(Math.random() * availablePets.length)];
    records[weekIndex].petIcon = newPetIcon;
    
    // 保存数据
    saveAttendanceData(currentStudentId, records);
    
    // 更新UI
    renderMap();
    
    // 显示新的萌宠闪卡
    showToast('🔄 消耗3总积分重抽成功！');
    setTimeout(() => showPetCard(newPetIcon, weekIndex), 300);
}

window.addEventListener('resize', () => { if (document.getElementById('mapModal').style.display === 'flex') drawTreasurePath(); });
renderStudentList();
</script>
